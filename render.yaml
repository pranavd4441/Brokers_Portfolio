services:
  - type: web
    name: propertyos-backend
    env: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_ENVIRONMENT
        value: production
      - key: DJANGO_SETTINGS_MODULE
        value: property_os.settings
      - key: SECRET_PROVIDER
        value: env
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
