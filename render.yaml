databases:
  - name: propertyos-db
    databaseName: property_os
    user: property_os_user
    plan: free

services:
  - type: redis
    name: propertyos-redis
    plan: free
    ipAllowList: []  # Restrict external access; accessible only within the Render network

  - type: web
    name: propertyos-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    startCommand: python manage.py migrate && gunicorn property_os.wsgi:application --bind 0.0.0.0:10000 --workers 4
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_ENVIRONMENT
        value: production
      - key: DJANGO_SETTINGS_MODULE
        value: property_os.settings
      - key: SECRET_PROVIDER
        value: env
      - key: DATABASE_URL
        fromDatabase:
          name: propertyos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: propertyos-redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: PORT
        value: 10000

  - type: worker
    name: propertyos-celery-worker
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    startCommand: celery -A property_os worker --loglevel=info
    envVars:
      - key: DJANGO_ENVIRONMENT
        value: production
      - key: DJANGO_SETTINGS_MODULE
        value: property_os.settings
      - key: SECRET_PROVIDER
        value: env
      - key: DATABASE_URL
        fromDatabase:
          name: propertyos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: propertyos-redis
          property: connectionString
