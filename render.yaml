services:
  - type: web
    name: propertyos-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    dockerCommand: sh -c "python manage.py migrate && gunicorn property_os.wsgi:application --bind 0.0.0.0:10000 --workers 4"
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_ENVIRONMENT
        value: production
      - key: DJANGO_SETTINGS_MODULE
        value: property_os.settings
      - key: SECRET_PROVIDER
        value: env
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: PORT
        value: 10000

  - type: worker
    name: propertyos-celery-worker
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    dockerCommand: celery -A property_os worker --loglevel=info
    envVars:
      - key: DJANGO_ENVIRONMENT
        value: production
      - key: DJANGO_SETTINGS_MODULE
        value: property_os.settings
      - key: SECRET_PROVIDER
        value: env
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
