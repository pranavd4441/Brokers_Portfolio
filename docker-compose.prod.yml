version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: propertyos_db_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-property_os_prod}
      POSTGRES_USER: ${POSTGRES_USER:-postgres_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: propertyos_pgbouncer
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-property_os_prod}
      - MIN_POOL_SIZE=5
      - MAX_CLIENT_CONN=500
      - DEFAULT_POOL_SIZE=20
      - POOL_MODE=transaction
    depends_on:
      db:
        condition: service_healthy
    restart: always
    ports:
      - "6432:6432"

  redis:
    image: redis:7-alpine
    container_name: propertyos_redis_prod
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: propertyos_backend_prod
    # Gunicorn handles production WSGI server with concurrency & graceful shutdown
    command: gunicorn property_os.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 60 --graceful-timeout 30
    volumes:
      - django_prod_media:/app/media
      - django_prod_static:/app/static
    environment:
      - DJANGO_SETTINGS_MODULE=property_os.settings
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres_admin}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-property_os_prod}
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DJANGO_CORS_ALLOWED_ORIGINS=${DJANGO_CORS_ALLOWED_ORIGINS}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DJANGO_ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: always
    healthcheck:
      # Leverage upgraded health view for liveness probe
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: propertyos_celery_prod
    command: celery -A property_os worker --loglevel=info -Q default,media,whatsapp --concurrency=4
    environment:
      - DJANGO_SETTINGS_MODULE=property_os.settings
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres_admin}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-property_os_prod}
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=False
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DJANGO_ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: propertyos_frontend_prod
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:1.25-alpine
    container_name: propertyos_nginx_prod
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - django_prod_media:/app/media:ro
      - django_prod_static:/app/static:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  postgres_prod_data:
  redis_prod_data:
  django_prod_media:
  django_prod_static:
