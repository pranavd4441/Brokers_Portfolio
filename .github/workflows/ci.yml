name: PropertyOS CI/CD Pipeline

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: property_os_test
          POSTGRES_USER: postgres_admin
          POSTGRES_PASSWORD: secure_postgres_pass_123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install flake8 black bandit pytest pytest-django coverage

    - name: Run Formatter (Black) Check
      run: |
        black --check backend/

    - name: Run Linter (Flake8) Check
      run: |
        flake8 backend/ --max-line-length=120 --exclude=venv,migrations

    - name: Run Security Scan (Bandit)
      run: |
        bandit -r backend/ -x venv/

    - name: Check Django Migrations
      env:
        DATABASE_URL: postgres://postgres_admin:secure_postgres_pass_123@localhost:5432/property_os_test
        DJANGO_SECRET_KEY: django-insecure-ci-secret-key-to-run-migration-checks
      run: |
        cd backend
        python manage.py makemigrations --check --dry-run

    - name: Run Tests with Coverage
      env:
        DATABASE_URL: postgres://postgres_admin:secure_postgres_pass_123@localhost:5432/property_os_test
        REDIS_URL: redis://localhost:6379/0
        DJANGO_SECRET_KEY: django-insecure-ci-secret-key-to-run-tests
        DJANGO_ENVIRONMENT: development
      run: |
        cd backend
        coverage run -m pytest
        coverage report -m

  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Verify Backend Image Build
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: false
        tags: propertyos-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Verify Frontend Image Build
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: false
        tags: propertyos-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
