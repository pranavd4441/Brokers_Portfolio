version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: propertyos_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-property_os}
      POSTGRES_USER: ${POSTGRES_USER:-postgres_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_postgres_pass_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: propertyos_redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: propertyos_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - django_media:/app/media
      - django_static:/app/static
    environment:
      - DJANGO_SETTINGS_MODULE=property_os.settings
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres_admin}:${POSTGRES_PASSWORD:-secure_postgres_pass_123}@db:5432/${POSTGRES_DB:-property_os}
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-key-123}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,nginx}
      - DJANGO_CORS_ALLOWED_ORIGINS=${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-insecure-secret-key}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME:-}
      - AWS_S3_ENDPOINT_URL=${AWS_S3_ENDPOINT_URL:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: always

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: propertyos_celery
    command: celery -A property_os worker --loglevel=info
    volumes:
      - ./backend:/app
      - django_media:/app/media
      - django_static:/app/static
    environment:
      - DJANGO_SETTINGS_MODULE=property_os.settings
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres_admin}:${POSTGRES_PASSWORD:-secure_postgres_pass_123}@db:5432/${POSTGRES_DB:-property_os}
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-key-123}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-insecure-secret-key}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME:-}
      - AWS_S3_ENDPOINT_URL=${AWS_S3_ENDPOINT_URL:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: propertyos_frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost/api}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost}
      - BACKEND_URL=http://backend:8000
      - PORT=3000
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:1.25-alpine
    container_name: propertyos_nginx
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - django_media:/app/media:ro
      - django_static:/app/static:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  postgres_data:
  django_media:
  django_static:
